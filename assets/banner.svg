<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6464" />
      <stop offset="100%" stop-color="#6464ff" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad1)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite" />
  </rect>
  <text x="400" y="100" dominant-baseline="middle" text-anchor="middle" font-size="40" font-family="Arial, sans-serif" fill="white" font-weight="bold">
    Awesome OOD Detection
    <animate attributeName="y" values="90;110;90" dur="5s" repeatCount="indefinite" />
  </text>
  <text x="400" y="150" dominant-baseline="middle" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="white">
    Safety &amp; Reliability in AI
  </text>
</svg>